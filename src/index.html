<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="settings-page">
    <section class="settings-card">
      <header class="settings-header">
        <h1>Settings</h1>
        <p>Update your profile and preferences.</p>
      </header>

      <form id="settings-form" class="settings-form" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            autocomplete="name"
            placeholder="Enter your name"
            required
          >
          <span class="error-message" id="name-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          >
          <span class="error-message" id="email-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="theme">Theme</label>
          <select id="theme" name="theme" required>
            <option value="">Select a theme</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="system">System</option>
          </select>
          <span class="error-message" id="theme-error" aria-live="polite"></span>
        </div>

        <button type="submit" class="save-btn">Save</button>
      </form>

      <p id="success-message" class="success-message" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
