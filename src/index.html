<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="settings-page">
    <section class="settings-card" aria-labelledby="settings-heading">
      <header class="settings-header">
        <h1 id="settings-heading">Settings</h1>
        <p>Manage your account preferences and appearance.</p>
      </header>

      <form id="settings-form" class="settings-form" novalidate>
        <div class="form-group">
          <label for="full-name">Full Name</label>
          <input
            type="text"
            id="full-name"
            name="fullName"
            autocomplete="name"
            placeholder="Jane Doe"
            aria-required="true"
            required
          >
          <span class="error-message" id="full-name-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="jane@example.com"
            aria-required="true"
            required
          >
          <span class="error-message" id="email-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="new-password"
            placeholder="Enter password"
            aria-required="true"
            aria-describedby="password-hint"
            required
          >
          <p class="field-hint" id="password-hint">
            At least 8 characters with one uppercase letter and one number.
          </p>
          <span class="error-message" id="password-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input
            type="password"
            id="confirm-password"
            name="confirmPassword"
            autocomplete="new-password"
            placeholder="Re-enter password"
            aria-required="true"
            required
          >
          <span class="error-message" id="confirm-password-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="theme">Theme</label>
          <select id="theme" name="theme" aria-required="true" required>
            <option value="">Select a theme</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
          <span class="error-message" id="theme-error" aria-live="polite"></span>
        </div>

        <div class="form-group form-group--checkbox">
          <input
            type="checkbox"
            id="notifications"
            name="notifications"
          >
          <label for="notifications">Enable email notifications</label>
        </div>

        <button type="submit" class="save-btn">Save Settings</button>
      </form>

      <p id="success-message" class="success-message" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
